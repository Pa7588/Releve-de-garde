<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Relève de garde</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 22px;
    width: 420px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  h1 { font-size: 20px; margin-bottom: 6px; }

  .now { font-size: 14px; opacity: 0.8; margin-bottom: 10px; }

  .top { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

  label {
    font-size: 13px;
    opacity: 0.8;
    display: block;
    margin-top: 10px;
    text-align: left;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    text-align: center;
    font-size: 15px;
  }

  button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    cursor: pointer;
    font-size: 13px;
  }

  button:hover { background: rgba(255,255,255,0.25); }

  .block {
    margin-top: 12px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    font-size: 13px;
    text-align: left;
    line-height: 1.5;
  }

  .big {
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin-top: 10px;
  }

  .roulette {
    margin-top: 10px;
    height: 18px;
    font-size: 14px;
    opacity: 0.8;
    text-align:center;
  }
</style>
</head>

<body>

<div class="card">

  <h1>Relève de garde</h1>

  <div class="now" id="now"></div>

  <div class="top" id="summaryTop"></div>

  <label>Heure du coucher</label>
  <input type="time" id="startTime">
  <button onclick="setNow()">Maintenant</button>

  <label>Fin de garde</label>
  <input type="time" id="endTime" value="08:00">

  <button onclick="calculate()">Calculer</button>

  <div class="block" id="middle"></div>

  <div class="block" id="shifts"></div>

  <button id="drawBtn" onclick="randomPick()">🎲 Tirage créneau</button>

  <div class="roulette" id="roulette">---</div>
  <div class="big" id="winner"></div>

</div>

<script>

function pad(n){return n.toString().padStart(2,'0');}

function formatTime(d){
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatDuration(ms){
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  return `${h}h${pad(m)}`;
}

function getDates(){
  const s=document.getElementById('startTime').value;
  const e=document.getElementById('endTime').value;
  if(!s||!e) return null;

  const [sh,sm]=s.split(':').map(Number);
  const [eh,em]=e.split(':').map(Number);

  let start=new Date();
  start.setHours(sh,sm,0,0);

  let end=new Date();
  end.setHours(eh,em,0,0);

  if(end<=start) end.setDate(end.getDate()+1);

  let mid=new Date((start.getTime()+end.getTime())/2);

  return {start,end,mid};
}

function calculate(){

  const now=new Date();
  const data=getDates();
  if(!data) return;

  const {start,end,mid}=data;

  let remaining=end-now;
  if(remaining<0) remaining+=24*3600000;

  document.getElementById('summaryTop').innerHTML=
    `⏳ Temps de travail restant : <b>${formatDuration(remaining)}</b>`;

  const total=end-start;
  const d1=mid-start;

  document.getElementById('middle').innerHTML=
    `📍  Durée restante après coupure : ${formatDuration(total)}<br>`+
    `⏰ Heure de la relève : <b>${formatTime(mid)}</b><br>`+
    `🛏️ Durée d’un créneau : <b>${formatDuration(d1)}</b>`;

  document.getElementById('shifts').innerHTML=
    `Créneau 1 : ${formatTime(start)} → ${formatTime(mid)}<br>`+
    `Créneau 2 : ${formatTime(mid)} → ${formatTime(end)}`;

  document.getElementById('now').innerText=`Il est : ${formatTime(now)}`;
}

function setNow(){
  const now=new Date();
  document.getElementById('startTime').value=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  calculate();
}

function randomPick(){

  const btn=document.getElementById('drawBtn');
  btn.disabled=true;

  document.getElementById('winner').innerText="";
  document.getElementById('roulette').innerText="---";

  let i=0;
  const spins=["Créneau 1","Créneau 2"];

  const anim=setInterval(()=>{
    document.getElementById('roulette').innerText=spins[i%2];
    i++;
  },100);

  const pick = Math.random() < 0.5 ? 1 : 2; // SINGLE RANDOM ONCE

  setTimeout(()=>{
    clearInterval(anim);

    document.getElementById('roulette').innerText="";

    document.getElementById('winner').innerText=
      pick===1
        ? "🎯 Créneau 1"
        : "🎯 Créneau 2";

    btn.disabled=false;

  },1400);
}

setInterval(calculate,1000);
setNow();

</script>

</body>
</html>
