<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Relève de garde</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .now {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      opacity: 0.8;
      display: block;
      margin-top: 10px;
    }

    input {
      margin-top: 6px;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      margin-top: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255,255,255,0.25);
    }

    .result {
      margin-top: 15px;
      font-size: 24px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.6;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Relève de garde</h1>

    <div class="now" id="now"></div>

    <label>Heure du coucher</label>
    <input type="time" id="startTime">
    <button onclick="setNow()">Maintenant</button>

    <label>Fin de garde</label>
    <input type="time" id="endTime" value="08:00">

    <div class="result" id="result">--:--</div>
    <div class="subtitle">heure de relève</div>
  </div>

  <script>
    function formatTime(date) {
      return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    function updateNow() {
      const now = new Date();
      document.getElementById('now').textContent = formatTime(now);
    }

    function setNow() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('startTime').value = `${h}:${m}`;
      calculateMidpoint();
    }

    function calculateMidpoint() {
      const startInput = document.getElementById('startTime').value;
      const endInput = document.getElementById('endTime').value;

      if (!startInput || !endInput) return;

      const [sh, sm] = startInput.split(":").map(Number);
      const [eh, em] = endInput.split(":").map(Number);

      let start = new Date();
      start.setHours(sh, sm, 0, 0);

      let end = new Date();
      end.setHours(eh, em, 0, 0);

      if (end <= start) {
        end.setDate(end.getDate() + 1);
      }

      const midpoint = new Date((start.getTime() + end.getTime()) / 2);

      document.getElementById('result').textContent = formatTime(midpoint);
    }

    document.getElementById('startTime').addEventListener('input', calculateMidpoint);
    document.getElementById('endTime').addEventListener('input', calculateMidpoint);

    setInterval(updateNow, 1000);

    // Init
    updateNow();
    setNow();
  </script>
</body>
</html>
